<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NeedYou</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/app.css">
</head><body>
<div class="container section"><div id="lang-tools"></div><div class="card" style="max-width:680px;margin:auto;">
<h2>NeedYou Registration</h2>
<p class="muted">Email verification is required to fully activate the account.</p>
<div class="grid-2"><input id="fullName" placeholder="Full name"><input id="phone" placeholder="Phone"></div>
<input id="email" placeholder="email@domain.com" style="margin-top:8px;"><input id="password" type="password" placeholder="Password">
<button class="btn btn-primary" style="margin-top:8px;" onclick="registerUser()">Register</button>

<div class="card" style="margin-top:12px;">
  <h3>Email Verification</h3>
  <p id="verifyState" class="muted">Not verified</p>
  <input id="otpEmail" placeholder="email">
  <input id="otpCode" placeholder="OTP">
  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn btn-soft" onclick="verifyOtp()">Verify</button>
    <button class="btn btn-soft" onclick="resendOtp()">Resend email</button>
  </div>
</div>

<p id="msg" class="muted"></p>
<p><a href="/login">Login</a></p>
</div></div>
<script src="/js/app.js"></script>
<script>
async function registerUser(){
  try{
    const data = await NeedYou.api('/api/auth/register',{method:'POST',body:JSON.stringify({fullName:fullName.value,email:email.value,phone:phone.value,password:password.value})});
    NeedYou.setToken(data.token); otpEmail.value=email.value;
    verifyState.textContent='Verification email sent';
    msg.textContent=data.message;
  }catch(e){msg.textContent=e.message;}
}
async function verifyOtp(){
  try{
    const data = await NeedYou.api('/api/auth/verify-email',{method:'POST',body:JSON.stringify({email:otpEmail.value,code:otpCode.value})});
    NeedYou.setToken(data.token); verifyState.textContent='Verified successfully';
    setTimeout(()=>location.href='/onboarding',600);
  }catch(e){verifyState.textContent='Email not verified'; msg.textContent=e.message;}
}
async function resendOtp(){
  try{ const data = await NeedYou.api('/api/auth/resend-otp',{method:'POST',body:JSON.stringify({email:otpEmail.value || email.value})}); msg.textContent=data.message; }
  catch(e){ msg.textContent=e.message; }
}
applyI18n(); renderLanguageAndCurrency();
</script>
</body></html>
