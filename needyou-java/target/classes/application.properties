spring.application.name=needyou-web
server.port=8080

spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=jdbc:h2:file:./data/needyou;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.jwt.secret=change-me-to-a-very-long-secret-key-at-least-32-bytes
app.jwt.expiration-minutes=720
app.storage.path=./storage

app.auth.debug-otp=true
app.auth.otp-expiration-minutes=15
app.auth.otp-max-attempts=5
app.auth.otp-lock-minutes=30
app.mail.from=no-reply@needyou.dz

app.admin.bootstrap-email=
app.admin.bootstrap-password=
app.admin.bootstrap-full-name=NeedYou Admin

spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.ai.openai-api-key=
app.ai.openai-model=gpt-4o-mini
app.ai.openai-url=https://api.openai.com/v1/chat/completions
app.ai.max-retries=2
app.rate-limit.per-minute=20
